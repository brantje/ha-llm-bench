name: Conversational Tests

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src
      TZ: ${{ vars.TZ != '' && vars.TZ || 'UTC' }}
      HA_URL: ${{ vars.HA_URL != '' && vars.HA_URL || 'http://localhost:8123' }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OPENROUTER_MANAGEMENT_KEY: ${{ secrets.OPENROUTER_MANAGEMENT_KEY }}
      OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL }}
      OPENROUTER_FREE_ONLY: ${{ vars.OPENROUTER_FREE_ONLY != '' && vars.OPENROUTER_FREE_ONLY || 'true' }}
      OPENROUTER_MIN_CONTEXT: ${{ vars.OPENROUTER_MIN_CONTEXT != '' && vars.OPENROUTER_MIN_CONTEXT || '8192' }}
      OPENROUTER_ALLOWLIST: ${{ vars.OPENROUTER_ALLOWLIST }}
      OPENROUTER_DENYLIST: ${{ vars.OPENROUTER_DENYLIST }}
      OPENROUTER_MAX_MODELS: ${{ vars.OPENROUTER_MAX_MODELS != '' && vars.OPENROUTER_MAX_MODELS || '2' }}
      OPENROUTER_RATE_LIMIT_MAX_RETRIES: ${{ vars.OPENROUTER_RATE_LIMIT_MAX_RETRIES != '' && vars.OPENROUTER_RATE_LIMIT_MAX_RETRIES || '8' }}
      OPENROUTER_RATE_LIMIT_BUFFER_SECONDS: ${{ vars.OPENROUTER_RATE_LIMIT_BUFFER_SECONDS != '' && vars.OPENROUTER_RATE_LIMIT_BUFFER_SECONDS || '1' }}
      OPENROUTER_RATE_LIMIT_FALLBACK_SECONDS: ${{ vars.OPENROUTER_RATE_LIMIT_FALLBACK_SECONDS != '' && vars.OPENROUTER_RATE_LIMIT_FALLBACK_SECONDS || '30' }}
      OPENROUTER_USAGE_SETTLE_SECONDS: ${{ vars.OPENROUTER_USAGE_SETTLE_SECONDS != '' && vars.OPENROUTER_USAGE_SETTLE_SECONDS || '12' }}
    steps:
      - uses: actions/checkout@v4

      - name: Check required secrets
        run: |
          if [ -z "$OPENROUTER_API_KEY" ]; then
            echo "::error::OPENROUTER_API_KEY repository secret is not set"
            exit 1
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt

      - name: Print OpenRouter config
        run: |
          echo "OPENROUTER_MODEL=${OPENROUTER_MODEL:-<empty>}"
          echo "OPENROUTER_FREE_ONLY=${OPENROUTER_FREE_ONLY:-<empty>}"
          echo "OPENROUTER_MAX_MODELS=${OPENROUTER_MAX_MODELS:-<empty>}"
          if [ -n "$OPENROUTER_ALLOWLIST" ]; then
            echo "OPENROUTER_ALLOWLIST entries: $(echo "$OPENROUTER_ALLOWLIST" | tr ',' '\n' | wc -l)"
          else
            echo "OPENROUTER_ALLOWLIST=<empty>"
          fi
          PYTHONPATH=src .venv/bin/python -c "
          from ha_test.openrouter import get_target_model_ids
          ids = get_target_model_ids()
          print(f'Resolved target models ({len(ids)}):', ', '.join(ids[:10]), '...' if len(ids) > 10 else '')
          "

      - name: Restore benchmark history
        uses: actions/cache@v4
        with:
          path: reports/history
          key: benchmark-history-${{ github.repository }}-${{ github.ref_name }}
          restore-keys: |
            benchmark-history-${{ github.repository }}-

      - name: Start Home Assistant
        run: docker compose up -d --wait

      - name: Bootstrap Home Assistant
        run: .venv/bin/python bootstrap.py

      - name: Run conversational tests
        run: .venv/bin/pytest tests/ -v --tb=short

      - name: Prune stale history index entries
        if: always()
        run: PYTHONPATH=src .venv/bin/python -c "from ha_test.reporting import load_history_index; load_history_index()"

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-reports
          path: reports/

  deploy:
    needs: test
    if: >-
      always() &&
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: benchmark-reports
          path: reports

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies for history merge
        run: pip install -r requirements.txt

      - name: Merge prior GitHub Pages history
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          PYTHONPATH=src python -c "
          from ha_test.pages_history import merge_published_history
          added = merge_published_history()
          print(f'Merged {added} archived run(s) from live GitHub Pages')
          "
        continue-on-error: true

      - name: Prune history index before deploy
        run: PYTHONPATH=src python -c "from ha_test.reporting import load_history_index; print(f'{len(load_history_index())} history run(s) ready to deploy')"

      - name: Build static site
        run: |
          mkdir -p _site
          cp -r docs/* _site/
          cp -r reports _site/reports/
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
