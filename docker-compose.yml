services:
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:2026.5
    container_name: ha-test
    ports:
      - "8123:8123"
    volumes:
      - ./docker:/config
    environment:
      TZ: ${TZ:-UTC}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "code=$$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8123/api/); test \"$$code\" = '401' -o \"$$code\" = '200'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
